[DEFAULT]
# ==============================================================================
# BARK CORE NETWORK SETTINGS
# ==============================================================================

# [Required] Your unique private device key generated by the Bark iOS App.
key = 

# [Optional] The server URL endpoint. Change this if you host a private Bark server.
# Default: https://api.day.app
server = https://api.day.app


# ==============================================================================
# DEFAULT NOTIFICATION PALOAD PROPERTIES
# ==============================================================================

# [Optional] Default headline text for the notification banners.
title = Server Alert

# [Optional] Used to categorize notifications into collapsible piles in iOS.
group = Infrastructure

# [Optional] Sound file name to play. Do not include the file extension.
# Available choices include: alarm, chimes, electronic, birdsong, classic, etc.
sound = alarm

# [Optional] Interruption level dictating how iOS presents this message.
# Available choices:
#   active         : Default. Lights up screen and makes sound normally.
#   time_sensitive : Important. Breaks through Focus modes (Time Sensitive allowed).
#   critical       : Emergency. Directly bypasses system mute switch with high alert.
#   passive        : Silent. Appears in the notification center quietly without noise.
level = time_sensitive


# ==============================================================================
# END-TO-END ENCRYPTION (CRYPTOGRAPHY) MANAGEMENT
# ==============================================================================

# [Required for Encryption] Master toggle to activate cryptographic protection.
# Available choices: true, false (or 1, 0 / yes, no / on, off)
encryption = false

# [Required if encryption=true] Secret raw symmetric key matching selected algorithm length.
# Length validation rules (Must be exact):
#   For aes128 : Must be exactly 16 characters/bytes long.
#   For aes192 : Must be exactly 24 characters/bytes long.
#   For aes256 : Must be exactly 32 characters/bytes long.
encryption_key = 

# [Required except for ECB mode] Block initialization vector protecting CBC/GCM structures.
# Length validation rules:
#   Must be exactly 16 characters/bytes long for all supported block ciphers.
#   Ignored entirely if encryption_mechanism is configured as ecb.
iv = 

# [Optional] The key specification length of the AES cipher.
# Default fallback: aes256
# Available choices: aes128, aes192, aes256
encryption_algorithm = aes256

# [Optional] The feedback chaining mode for the cryptographic subsystem.
# Default fallback: cbc
# Available choices: cbc, ecb, gcm
encryption_mechanism = cbc

